server {
    listen 80;
    
    location /api/auth {
        proxy_pass http://auth-service:8080;
    }

    location /api/lemf {
        proxy_pass http://lemf-service:8080;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
