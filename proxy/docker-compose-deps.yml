services:
  # Installs frontend dependencies (npm packages) and exits
  frontend-deps:
    image: node:20
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: npm install --no-fund --no-audit

  # Pre-downloads backend dependencies (Maven packages) and exits
  backend-deps:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ../backend:/app
      # Caches downloaded dependencies in a volume so they persist between builds
      - maven-data:/root/.m2
    command: mvn dependency:go-offline

volumes:
  maven-data:
