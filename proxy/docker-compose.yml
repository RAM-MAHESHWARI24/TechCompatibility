services:
  # 1. The React Development Engine
  frontend:
    image: node:20
    working_dir: /app
    # The Wormhole: Mounts their local ./frontend folder into the container
    volumes:
      - ../frontend:/app
    # Automatically installs NPM packages and starts the Vite server
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures Hot-Reload works across the Docker bridge (critical for WSL)
    networks:
      - app-network

  # 2. The Node.js Development Engine (MVC Backend)
  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ../backend-node:/app
    # Automatically installs NPM packages and starts the Express server
    command: sh -c "npm install && npm run dev"
    ports:
      - "8080:8080"
    depends_on:
      pot-mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://pot-mysql:3306/pot_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=pot_user
      - SPRING_DATASOURCE_PASSWORD=pot_pass
      - PORT=8080
    networks:
      - app-network
    restart: on-failure

  # 2b. The original Spring Boot Development Engine (Java Backend) - Kept for reference
  # backend-java:
  #   image: maven:3.9-eclipse-temurin-17
  #   working_dir: /app
  #   volumes:
  #     - ../backend:/app
  #     # Caches Maven downloads so it doesn't re-download the internet on every boot
  #     - maven-data:/root/.m2 
  #   command: bash -c "chmod +x ./mvnw && ./mvnw spring-boot:run"
  #   ports:
  #     - "8082:8080"
  #   depends_on:
  #     pot-mysql:
  #       condition: service_healthy
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://pot-mysql:3306/pot_db?useSSL=false&allowPublicKeyRetrieval=true
  #     - SPRING_DATASOURCE_USERNAME=pot_user
  #     - SPRING_DATASOURCE_PASSWORD=pot_pass
  #     - SPRING_DEVTOOLS_RESTART_ENABLED=true
  #   networks:
  #     - app-network
  #   restart: on-failure

  # 3. The NGINX Gateway
  pot-nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # 4. The MySQL Database
  pot-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pot_db
      MYSQL_USER: pot_user
      MYSQL_PASSWORD: pot_pass
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 30s # Increased for WSL startup delays
      retries: 15  # More retries for slower WSL systems
      start_period: 30s # Grace period before first health check
    networks:
      - app-network

# Declaring named volumes for persistent storage
volumes:
  db-data:
  maven-data:

networks:
  app-network: