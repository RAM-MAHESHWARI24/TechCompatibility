version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: pot-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=pot_db
      - MYSQL_USER=pot_user
      - MYSQL_PASSWORD=pot_pass

  reverse-proxy:
    image: nginx:alpine
    container_name: pot-nginx
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - database
