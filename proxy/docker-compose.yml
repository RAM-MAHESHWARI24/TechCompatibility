services:
  # 1. The React Development Engine
  frontend:
    image: node:20-alpine
    working_dir: /app
    # The Wormhole: Mounts their local ./frontend folder into the container
    volumes:
      - ./frontend:/app
    # Automatically installs NPM packages and starts the Vite server
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures Hot-Reload works across the Docker bridge

  # 2. The Spring Boot Development Engine
  backend:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ./backend:/app
      # Caches Maven downloads so it doesn't re-download the internet on every boot
      - maven-data:/root/.m2 
    command: ./mvnw spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      - pot-mysql

  # 3. The NGINX Gateway
  pot-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf

  # 4. The MySQL Database
  pot-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tech_demo
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

# Declaring named volumes for persistent storage
volumes:
  db-data:
  maven-data: