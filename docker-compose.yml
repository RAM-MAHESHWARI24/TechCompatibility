version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: pot_user
      MYSQL_PASSWORD: pot_pass
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_USER=pot_user
      - DB_PASSWORD=pot_pass
      - DB_NAME=auth_db
      - PORT=8080
    ports:
      - "8081:8080"
    depends_on:
      - mysql-db

  lemf-service:
    build: ./lemf-service
    container_name: lemf-service
    environment:
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_USER=pot_user
      - DB_PASSWORD=pot_pass
      - DB_NAME=lemf_db
      - PORT=8080
    ports:
      - "8082:8080"
    depends_on:
      - mysql-db

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8000:80"
    depends_on:
      - auth-service
      - lemf-service

volumes:
  mysql_data:
